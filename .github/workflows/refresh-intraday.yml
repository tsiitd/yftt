name: Refresh Intraday Data

on:
  schedule:
    - cron: '55 8-21 * * 1-5' # Every hour on 55th minute, 08:55-21:55 UTC, Mon-Fri
  workflow_dispatch:           # Manual trigger

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run live refresh
        run: npm run refresh:live
