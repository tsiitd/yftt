name: Refresh EOD Data

on:
  schedule:
    - cron: '0 1 * * 1-5' # 01:00 UTC, Mon-Fri
  workflow_dispatch:      # Manual trigger

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run EOD refresh
        run: npm run refresh:eod
