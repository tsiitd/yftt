<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>TrendTop — Near 52w High</title>
  <script>document.documentElement.dataset.theme = localStorage.getItem('yf-theme') || 'dark';</script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <header>
    <div class="container-fluid header-inner">
      <div class="header-left">
        <strong>TrendTop</strong>
        <span class="header-sub">Yahoo Finance stocks within 1% of their 52-week high</span>
      </div>
      <button id="theme-toggle" class="icon-btn" aria-label="Toggle theme"></button>
    </div>
  </header>

  <main class="container-fluid">
    <div class="tab-row" role="tablist">
      <button class="tab-btn active" role="tab" data-tab="trending">Trending (25)</button>
      <button class="tab-btn" role="tab" data-tab="most_actives">Most Active (50)</button>
    </div>

    <div id="banner" class="banner" hidden></div>

    <div class="controls-row">
      <div class="controls-left">
        <button id="refresh-btn" class="outline secondary btn-refresh">&#x21BA; Refresh</button>
        <span id="last-updated" class="muted-text"></span>
        <div class="filter-group">
          <label class="filter-toggle">
            <input type="checkbox" id="filter-yest-high">
            <span>Exclude Yest 52w Hi</span>
          </label>
          <label class="filter-toggle">
            <input type="checkbox" id="filter-t2-high">
            <span>Exclude T-2D 52w Hi</span>
          </label>
        </div>
      </div>
      <div class="controls-right">
        <div class="dropdown-container">
          <button id="col-picker-btn" class="outline secondary col-btn" aria-label="Columns">&#x2630; Cols</button>
          <div id="col-picker-menu" class="col-menu" hidden>
            <!-- Generated by JS -->
          </div>
        </div>
      </div>
    </div>

    <div class="table-wrapper">
      <table id="main-table">
        <thead>
          <tr>
            <th data-col="ticker" class="sticky-col">Ticker</th>
            <th data-col="rank" data-default-dir="asc">Rank</th>
            <th data-col="name">Name</th>
            <th data-col="market_cap_bn">Mkt Cap $Bn</th>
            <th data-col="current_price">Price</th>
            <th data-col="change_pct">Chg %</th>
            <th>Ext-Hrs</th>
            <th data-col="ext_hr_change_pct">Ext %</th>
            <th data-col="high_52wk_t1">52w Hi T-1D</th>
            <th data-col="distance_pct">Dist %</th>
            <th data-col="t1_close">T-1D Close</th>
            <th data-col="high_52wk_t2" class="hidden-col">52w Hi T-2D</th>
            <th data-col="yesterday_was_52w_high">Yest 52w Hi?</th>
            <th data-col="t2_close">T-2D Close</th>
            <th data-col="high_52wk_t3" class="hidden-col">52w Hi T-3D</th>
            <th data-col="t2_was_52w_high">T-2D 52w Hi?</th>
          </tr>
        </thead>
        <tbody id="table-body">
          <tr><td colspan="16" class="msg-cell">Loading&hellip;</td></tr>
        </tbody>
      </table>
    </div>

    <p id="row-count" class="row-count"></p>
  </main>

  <script src="assets/script.js" type="module"></script>
</body>
</html>
